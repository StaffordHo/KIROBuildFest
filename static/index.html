<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSim — Robotics Simulation Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117; color: #e6edf3; overflow: hidden;
        }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        canvas { display: block; }

        /* Control Panel */
        #panel {
            position: absolute; top: 16px; left: 16px;
            background: rgba(22, 27, 34, 0.95); border: 1px solid #30363d;
            border-radius: 12px; padding: 20px; width: 320px;
            backdrop-filter: blur(10px); z-index: 100;
        }
        #panel h1 { font-size: 18px; margin-bottom: 4px; color: #58a6ff; }
        #panel .subtitle { font-size: 12px; color: #8b949e; margin-bottom: 16px; }
        .section { margin-bottom: 16px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; margin-bottom: 8px; }
        
        button {
            background: #21262d; border: 1px solid #30363d; color: #e6edf3;
            padding: 8px 14px; border-radius: 6px; cursor: pointer;
            font-size: 13px; transition: all 0.15s;
        }
        button:hover { background: #30363d; border-color: #58a6ff; }
        button.active { background: #1f6feb; border-color: #58a6ff; }
        button.danger { border-color: #f85149; }
        button.danger:hover { background: #da3633; }
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

        /* Joint Sliders */
        .joint-slider { margin-bottom: 10px; }
        .joint-slider label { 
            display: flex; justify-content: space-between; 
            font-size: 12px; color: #8b949e; margin-bottom: 4px;
        }
        .joint-slider input[type="range"] {
            width: 100%; height: 4px; -webkit-appearance: none;
            background: #30363d; border-radius: 2px; outline: none;
        }
        .joint-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: #58a6ff; border-radius: 50%; cursor: pointer;
        }

        /* Status Bar */
        #status {
            position: absolute; bottom: 16px; left: 16px;
            background: rgba(22, 27, 34, 0.9); border: 1px solid #30363d;
            border-radius: 8px; padding: 10px 16px; font-size: 12px;
            display: flex; gap: 20px; z-index: 100;
        }
        #status .item { display: flex; gap: 6px; align-items: center; }
        #status .dot { width: 8px; height: 8px; border-radius: 50%; }
        #status .dot.green { background: #3fb950; }
        #status .dot.yellow { background: #d29922; }
        #status .dot.red { background: #f85149; }

        /* Info panel */
        #info {
            position: absolute; top: 16px; right: 16px;
            background: rgba(22, 27, 34, 0.9); border: 1px solid #30363d;
            border-radius: 12px; padding: 16px; width: 260px;
            font-size: 12px; z-index: 100;
        }
        #info h3 { font-size: 13px; color: #58a6ff; margin-bottom: 8px; }
        #info pre { 
            background: #0d1117; padding: 8px; border-radius: 6px;
            font-size: 11px; color: #7ee787; overflow: auto; max-height: 200px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- Control Panel -->
    <div id="panel">
        <h1>🤖 RoboSim</h1>
        <p class="subtitle">Open Robotics Simulation Platform</p>

        <div class="section">
            <div class="section-title">Simulation</div>
            <div class="btn-group">
                <button id="btn-create" onclick="createWorld()">New World</button>
                <button id="btn-start" onclick="controlSim('start')">▶ Start</button>
                <button id="btn-pause" onclick="controlSim('pause')">⏸ Pause</button>
                <button id="btn-reset" onclick="controlSim('reset')">↺ Reset</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Robot</div>
            <div class="btn-group">
                <button onclick="addRobot(3)">3-DOF Arm</button>
                <button onclick="addRobot(6)">6-DOF Arm</button>
                <button onclick="addRobot(9)">9-DOF Arm</button>
            </div>
            <div class="btn-group" style="margin-top:6px;">
                <button onclick="addDrone('quadcopter')">🚁 Quadcopter</button>
                <button onclick="addDrone('hexacopter')">🚁 Hexacopter</button>
            </div>
            <div class="btn-group" style="margin-top:6px;">
                <button onclick="addMobileRobot('differential')">🤖 Diff Drive</button>
                <button onclick="addMobileRobot('ackermann')">🚗 Ackermann</button>
                <button onclick="addMobileRobot('omnidirectional')">⊕ Omni</button>
            </div>
        </div>

        <div class="section" id="drone-section" style="display:none;">
            <div class="section-title">Drone Control</div>
            <div class="joint-slider">
                <label><span>Thrust</span><span id="val-thrust">0.00</span></label>
                <input type="range" min="0" max="1" step="0.01" value="0" id="slider-thrust" oninput="onDroneSlider()">
            </div>
            <div class="joint-slider">
                <label><span>Roll</span><span id="val-roll">0.00</span></label>
                <input type="range" min="-1" max="1" step="0.01" value="0" id="slider-roll" oninput="onDroneSlider()">
            </div>
            <div class="joint-slider">
                <label><span>Pitch</span><span id="val-pitch">0.00</span></label>
                <input type="range" min="-1" max="1" step="0.01" value="0" id="slider-pitch" oninput="onDroneSlider()">
            </div>
            <div class="joint-slider">
                <label><span>Yaw</span><span id="val-yaw">0.00</span></label>
                <input type="range" min="-1" max="1" step="0.01" value="0" id="slider-yaw" oninput="onDroneSlider()">
            </div>
        </div>

        <div class="section" id="mobile-section" style="display:none;">
            <div class="section-title">Mobile Robot Control</div>
            <div class="joint-slider">
                <label><span>Forward</span><span id="val-linear">0.00</span></label>
                <input type="range" min="-1" max="1" step="0.01" value="0" id="slider-linear" oninput="onMobileSlider()">
            </div>
            <div class="joint-slider">
                <label><span>Turn</span><span id="val-angular">0.00</span></label>
                <input type="range" min="-2" max="2" step="0.01" value="0" id="slider-angular" oninput="onMobileSlider()">
            </div>
        </div>

        <div class="section" id="joints-section" style="display:none;">
            <div class="section-title">Joint Control</div>
            <div id="joint-sliders"></div>
        </div>

        <div class="section">
            <div class="section-title">Upload URDF</div>
            <input type="file" id="urdf-file" accept=".urdf,.xml" onchange="uploadURDF()" 
                   style="font-size:12px; color:#8b949e;">
        </div>

        <div class="section">
            <div class="section-title">Model Library</div>
            <select id="model-select" style="width:100%;padding:6px;background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:6px;font-size:12px;margin-bottom:6px;">
                <option value="">— Select a robot model —</option>
                <optgroup label="Manipulators">
                    <option value="panda_franka">Franka Panda (7-DOF)</option>
                    <option value="kuka_iiwa">KUKA iiwa 14 (7-DOF)</option>
                </optgroup>
                <optgroup label="Mobile Robots">
                    <option value="r2d2">R2D2 Robot</option>
                    <option value="turtlebot3">TurtleBot3 Burger</option>
                    <option value="jackal">Clearpath Jackal UGV</option>
                </optgroup>
                <optgroup label="Humanoid">
                    <option value="humanoid">Humanoid Robot (17-DOF)</option>
                </optgroup>
                <optgroup label="Benchmarks">
                    <option value="cartpole">Cart-Pole (RL Classic)</option>
                </optgroup>
            </select>
            <button onclick="loadFromLibrary()" style="width:100%;">📦 Load Model</button>
            <div id="model-info" style="margin-top:8px;font-size:11px;color:#8b949e;"></div>
        </div>
    </div>

    <!-- Telemetry -->
    <div id="info">
        <h3>Telemetry</h3>
        <pre id="telemetry">Waiting for simulation...</pre>
    </div>

    <!-- Status Bar -->
    <div id="status">
        <div class="item"><div class="dot red" id="status-dot"></div><span id="status-text">Disconnected</span></div>
        <div class="item">Time: <span id="sim-time">0.00s</span></div>
        <div class="item">Steps: <span id="sim-steps">0</span></div>
        <div class="item">FPS: <span id="sim-fps">0</span></div>
    </div>

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/ColladaLoader.js"></script>

    <script>

        // ===================== STATE =====================
        const API = window.location.origin;
        const WS_BASE = window.location.origin.replace('http', 'ws');
        let worldId = null;
        let robotId = null;
        let robotJoints = [];
        let ws = null;
        let scene, camera, renderer, controls;
        let robotGroup = null;
        let linkMeshes = {};
        let frameCount = 0;
        let lastFpsTime = Date.now();

        // ===================== THREE.JS SETUP =====================
        function initScene() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d1117);

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
            camera.position.set(0.5, 0.5, 0.5);
            camera.lookAt(0, 0.2, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, 0.15, 0);

            // Lighting
            const ambient = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambient);

            const directional = new THREE.DirectionalLight(0xffffff, 0.8);
            directional.position.set(2, 4, 3);
            directional.castShadow = true;
            scene.add(directional);

            const point = new THREE.PointLight(0x58a6ff, 0.3);
            point.position.set(-1, 2, -1);
            scene.add(point);

            // Grid
            const grid = new THREE.GridHelper(2, 20, 0x30363d, 0x21262d);
            scene.add(grid);

            // Ground plane
            const groundGeo = new THREE.PlaneGeometry(4, 4);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x161b22, roughness: 0.9 
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.001;
            ground.receiveShadow = true;
            scene.add(ground);

            // Axis helper
            const axes = new THREE.AxesHelper(0.15);
            scene.add(axes);

            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);

            // FPS counter
            frameCount++;
            const now = Date.now();
            if (now - lastFpsTime > 1000) {
                document.getElementById('sim-fps').textContent = frameCount;
                frameCount = 0;
                lastFpsTime = now;
            }
        }

        // ===================== ROBOT VISUALIZATION =====================
        let jointPositions3D = []; // Array of THREE.Vector3 for each joint pos
        let linkCylinders = [];    // Cylinder meshes connecting joints
        let jointSpheres = [];     // Sphere meshes at joint locations
        let eeMesh = null;

        function buildRobotVisual(joints, linkCount) {
            // Remove existing robot
            if (robotGroup) scene.remove(robotGroup);
            robotGroup = new THREE.Group();
            linkMeshes = {};
            linkCylinders = [];
            jointSpheres = [];
            jointPositions3D = [];

            const colors = [
                0x58a6ff, 0x3fb950, 0xd29922, 0xf78166, 
                0xbc8cff, 0x79c0ff, 0x56d4dd, 0xff7b72, 0xffa657
            ];

            const numJoints = joints.filter(j => j !== 'ee_joint').length;

            // Base platform
            const baseGeo = new THREE.CylinderGeometry(0.05, 0.06, 0.025, 32);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x30363d, metalness: 0.7, roughness: 0.2 });
            const baseMesh = new THREE.Mesh(baseGeo, baseMat);
            baseMesh.position.y = 0.0125;
            baseMesh.castShadow = true;
            robotGroup.add(baseMesh);

            // Create joint spheres and link cylinders
            for (let i = 0; i <= numJoints; i++) {
                const color = colors[i % colors.length];

                // Joint sphere
                const radius = i === 0 ? 0.02 : 0.015;
                const jointGeo = new THREE.SphereGeometry(radius, 20, 20);
                const jointMat = new THREE.MeshStandardMaterial({
                    color: color, emissive: color, emissiveIntensity: 0.15,
                    metalness: 0.4, roughness: 0.4
                });
                const sphere = new THREE.Mesh(jointGeo, jointMat);
                sphere.castShadow = true;
                robotGroup.add(sphere);
                jointSpheres.push(sphere);

                // Initial position straight up
                const y = 0.025 + i * 0.1;
                sphere.position.set(0, y, 0);
                jointPositions3D.push(new THREE.Vector3(0, y, 0));

                // Link cylinder connecting this joint to the next
                if (i < numJoints) {
                    const linkGeo = new THREE.CylinderGeometry(0.012, 0.012, 1, 12); // height=1, we'll scale
                    const linkMat = new THREE.MeshStandardMaterial({
                        color: color, metalness: 0.5, roughness: 0.3
                    });
                    const cyl = new THREE.Mesh(linkGeo, linkMat);
                    cyl.castShadow = true;
                    robotGroup.add(cyl);
                    linkCylinders.push(cyl);
                }
            }

            // End effector
            const eeGeo = new THREE.BoxGeometry(0.035, 0.02, 0.035);
            const eeMat = new THREE.MeshStandardMaterial({ color: 0xf85149, emissive: 0xf85149, emissiveIntensity: 0.3 });
            eeMesh = new THREE.Mesh(eeGeo, eeMat);
            eeMesh.castShadow = true;
            robotGroup.add(eeMesh);
            eeMesh.position.copy(jointSpheres[jointSpheres.length - 1].position);

            scene.add(robotGroup);
            updateCylinders(); // Position cylinders between joints
        }

        function updateCylinders() {
            // Position each cylinder to stretch between consecutive joint spheres
            for (let i = 0; i < linkCylinders.length; i++) {
                const cyl = linkCylinders[i];
                const start = jointSpheres[i].position;
                const end = jointSpheres[i + 1].position;

                // Midpoint
                cyl.position.set(
                    (start.x + end.x) / 2,
                    (start.y + end.y) / 2,
                    (start.z + end.z) / 2
                );

                // Length
                const dir = new THREE.Vector3().subVectors(end, start);
                const length = dir.length();
                cyl.scale.set(1, length, 1);

                // Orientation: align Y-axis of cylinder with direction
                if (length > 0.001) {
                    const up = new THREE.Vector3(0, 1, 0);
                    const quat = new THREE.Quaternion().setFromUnitVectors(up, dir.normalize());
                    cyl.quaternion.copy(quat);
                }
            }

            // Update end effector position
            if (eeMesh && jointSpheres.length > 0) {
                eeMesh.position.copy(jointSpheres[jointSpheres.length - 1].position);
                eeMesh.position.y += 0.015;
            }
        }

        function updateRobotFromState(robotState) {
            if (!robotState || !robotState.links) return;

            // Collect all link positions from physics in order
            const linkNames = Object.keys(robotState.links);
            
            // Map link positions to joint spheres
            // Order: base_link, link_1, link_2, ..., link_N, end_effector
            const orderedLinks = ['base_link'];
            for (let i = 1; i <= jointSpheres.length - 1; i++) {
                orderedLinks.push(`link_${i}`);
            }
            orderedLinks.push('end_effector');

            for (let i = 0; i < orderedLinks.length && i < jointSpheres.length; i++) {
                const linkName = orderedLinks[i];
                const poseData = robotState.links[linkName];
                if (poseData && poseData.position) {
                    const [x, y, z] = poseData.position;
                    // Convert from sim coords (Z-up) to Three.js (Y-up)
                    jointSpheres[i].position.set(x, z, -y);
                }
            }

            // Update end effector
            const eePose = robotState.links['end_effector'];
            if (eePose && eePose.position && eeMesh) {
                const [x, y, z] = eePose.position;
                eeMesh.position.set(x, z, -y);
            }

            // Recompute cylinder positions between spheres
            updateCylinders();
        }

        // ===================== API CALLS =====================
        async function createWorld() {
            const r = await fetch(`${API}/worlds`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: 'sim_world' })
            });
            const data = await r.json();
            worldId = data.world_id;
            setStatus('idle', 'World created');
            connectWebSocket();
        }

        async function addRobot(dof) {
            if (!worldId) { await createWorld(); }
            const r = await fetch(`${API}/worlds/${worldId}/robots`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: `arm_${dof}dof`, dof: dof, link_length: 0.1 })
            });
            const data = await r.json();
            robotId = data.robot_id;
            robotJoints = data.joints.filter(j => j !== 'ee_joint');
            
            buildRobotVisual(data.joints, dof);
            buildJointSliders(robotJoints);
            
            document.getElementById('joints-section').style.display = 'block';
            setStatus('idle', `${dof}-DOF robot added`);
        }

        async function controlSim(action) {
            if (!worldId) return;
            const r = await fetch(`${API}/worlds/${worldId}/control`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action })
            });
            const data = await r.json();
            setStatus(data.status, `Simulation ${action}`);
        }

        async function sendJointPositions(positions) {
            if (!worldId || !robotId) return;
            await fetch(`${API}/worlds/${worldId}/joints`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ robot_id: robotId, positions })
            });
        }

        async function uploadURDF() {
            const file = document.getElementById('urdf-file').files[0];
            if (!file || !worldId) {
                if (!worldId) await createWorld();
                if (!file) return;
            }
            const formData = new FormData();
            formData.append('file', file);
            const r = await fetch(`${API}/worlds/${worldId}/robots/upload`, {
                method: 'POST', body: formData
            });
            const data = await r.json();
            robotId = data.robot_id;
            robotJoints = data.joints.filter(j => !j.includes('fixed'));
            buildRobotVisual(data.joints, data.dof);
            buildJointSliders(robotJoints);
            document.getElementById('joints-section').style.display = 'block';
            setStatus('idle', `URDF loaded: ${data.name}`);
        }

        // ===================== WEBSOCKET =====================
        function connectWebSocket() {
            if (ws) ws.close();
            ws = new WebSocket(`${WS_BASE}/ws/${worldId}`);
            
            ws.onopen = () => setStatus('connected', 'WebSocket connected');
            ws.onclose = () => setStatus('disconnected', 'WebSocket closed');
            ws.onerror = () => setStatus('error', 'WebSocket error');
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'state_update') {
                    document.getElementById('sim-time').textContent = msg.sim_time.toFixed(2) + 's';
                    document.getElementById('sim-steps').textContent = msg.step_count;

                    // Update arm visualization
                    for (const [rid, robotState] of Object.entries(msg.robots || {})) {
                        updateRobotFromState(robotState);

                        // Update telemetry
                        const joints = robotState.joints || {};
                        let telemetry = '';
                        for (const [jname, jstate] of Object.entries(joints)) {
                            telemetry += `${jname}: ${jstate.position.toFixed(3)} rad\n`;
                        }
                        document.getElementById('telemetry').textContent = telemetry || 'No data';
                    }

                    // Update drones
                    if (msg.drones) {
                        updateDroneFromState(msg.drones);
                        // Telemetry for drones
                        for (const [did, state] of Object.entries(msg.drones)) {
                            let t = `Drone: ${did.slice(0,8)}\n`;
                            t += `Alt: ${state.position[2].toFixed(2)}m\n`;
                            t += `Vel: [${state.velocity.map(v=>v.toFixed(2)).join(', ')}]\n`;
                            t += `Battery: ${state.battery.toFixed(1)}%\n`;
                            document.getElementById('telemetry').textContent = t;
                        }
                    }

                    // Update mobile robots
                    if (msg.mobile_robots) {
                        updateMobileRobotFromState(msg.mobile_robots);
                        for (const [rid, state] of Object.entries(msg.mobile_robots)) {
                            let t = `Mobile Robot\n`;
                            t += `Pos: (${state.position[0].toFixed(2)}, ${state.position[1].toFixed(2)})\n`;
                            t += `Heading: ${(state.heading * 180 / Math.PI).toFixed(1)}°\n`;
                            t += `Speed: ${state.linear_velocity.toFixed(2)} m/s\n`;
                            document.getElementById('telemetry').textContent = t;
                        }
                    }
                }
            };
        }

        // ===================== UI HELPERS =====================
        function buildJointSliders(joints) {
            const container = document.getElementById('joint-sliders');
            container.innerHTML = '';
            
            for (const joint of joints) {
                const div = document.createElement('div');
                div.className = 'joint-slider';
                div.innerHTML = `
                    <label>
                        <span>${joint}</span>
                        <span id="val-${joint}">0.00</span>
                    </label>
                    <input type="range" min="-3.14" max="3.14" step="0.01" value="0"
                           id="slider-${joint}" oninput="onSliderChange('${joint}', this.value)">
                `;
                container.appendChild(div);
            }
        }

        function onSliderChange(joint, value) {
            document.getElementById(`val-${joint}`).textContent = parseFloat(value).toFixed(2);
            
            // Collect all slider values and send
            const positions = {};
            for (const j of robotJoints) {
                const slider = document.getElementById(`slider-${j}`);
                if (slider) positions[j] = parseFloat(slider.value);
            }
            
            // Send via WebSocket if connected, otherwise REST
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'joint_command', positions }));
            } else {
                sendJointPositions(positions);
            }
        }

        function setStatus(status, text) {
            const dot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            dot.className = 'dot';
            
            if (status === 'running' || status === 'connected') dot.classList.add('green');
            else if (status === 'idle' || status === 'paused') dot.classList.add('yellow');
            else dot.classList.add('red');
            
            statusText.textContent = text;
        }

        // ===================== MODEL LIBRARY =====================
        async function loadFromLibrary() {
            const modelId = document.getElementById('model-select').value;
            if (!modelId) { alert('Select a model first'); return; }
            if (!worldId) { await createWorld(); }

            document.getElementById('model-info').textContent = '⏳ Fetching model...';

            try {
                const r = await fetch(`${API}/api/models/fetch`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ model_id: modelId, world_id: worldId })
                });

                if (!r.ok) {
                    const err = await r.json();
                    document.getElementById('model-info').textContent = '❌ ' + (err.detail || 'Failed to load');
                    return;
                }

                const data = await r.json();
                robotId = data.robot_id;
                robotJoints = data.joints.filter(j => !j.includes('fixed'));
                const meshBaseUrl = data.mesh_base_url || '';

                // Fetch geometry info for proper rendering
                const geoResp = await fetch(`${API}/worlds/${worldId}/robots/${data.robot_id}/geometry`);
                let geometryData = null;
                if (geoResp.ok) {
                    geometryData = await geoResp.json();
                }

                // Build visualization with mesh loading
                buildRobotFromGeometry(geometryData, data.joints, data.dof, meshBaseUrl);
                buildJointSliders(robotJoints);
                document.getElementById('joints-section').style.display = 'block';
                document.getElementById('drone-section').style.display = 'none';
                document.getElementById('mobile-section').style.display = 'none';

                document.getElementById('model-info').textContent =
                    `✅ ${data.name} loaded (${data.dof} DOF, ${data.links} links)`;
                setStatus('idle', `${data.name} loaded`);

                // Auto-start
                controlSim('start');
            } catch (e) {
                document.getElementById('model-info').textContent = '❌ Network error: ' + e.message;
            }
        }

        function buildRobotFromGeometry(geometryData, joints, dof, meshBaseUrl) {
            /**
             * Build robot visualization using URDF geometry with auto-generated body shapes.
             * Renders industrial-looking capsules/cylinders for links and joint housings.
             */
            if (robotGroup) scene.remove(robotGroup);
            robotGroup = new THREE.Group();
            linkCylinders = [];
            jointSpheres = [];

            if (!geometryData || !geometryData.joints) {
                buildRobotVisual(joints, dof);
                return;
            }

            const jointEntries = Object.entries(geometryData.joints);
            const linkBodies = geometryData.link_bodies || {};
            const jointHousings = geometryData.joint_housings || {};

            // Base platform
            const baseBody = linkBodies[Object.keys(linkBodies)[0]];
            const baseGeo = new THREE.CylinderGeometry(0.06, 0.07, 0.04, 32);
            const baseMat = new THREE.MeshStandardMaterial({
                color: 0x2a2a2a, metalness: 0.8, roughness: 0.2
            });
            const baseMesh = new THREE.Mesh(baseGeo, baseMat);
            baseMesh.position.y = 0.02;
            baseMesh.castShadow = true;
            baseMesh.receiveShadow = true;
            robotGroup.add(baseMesh);

            // Track joint positions for FK update
            let cumulativePos = new THREE.Vector3(0, 0.04, 0);

            // First joint sphere (at base top)
            const baseJointGeo = new THREE.CylinderGeometry(0.038, 0.038, 0.045, 24);
            const baseJointMat = new THREE.MeshStandardMaterial({
                color: 0x3a5a8a, metalness: 0.6, roughness: 0.3
            });
            const baseJoint = new THREE.Mesh(baseJointGeo, baseJointMat);
            baseJoint.position.copy(cumulativePos);
            baseJoint.castShadow = true;
            robotGroup.add(baseJoint);
            jointSpheres.push(baseJoint);

            // Build each link as a proper body connecting joints
            for (let i = 0; i < jointEntries.length; i++) {
                const [jname, jdata] = jointEntries[i];

                // Convert URDF offset (Z-up) to Three.js (Y-up)
                const ox = jdata.origin.x;
                const oy = jdata.origin.y;
                const oz = jdata.origin.z;

                const nextPos = cumulativePos.clone();
                nextPos.x += ox;
                nextPos.y += oz;  // Z -> Y
                nextPos.z += -oy; // Y -> -Z

                // Calculate link length
                const dir = new THREE.Vector3().subVectors(nextPos, cumulativePos);
                const linkLength = dir.length();

                // Link body — thick cylinder with rounded caps
                if (linkLength > 0.01) {
                    const bodyRadius = Math.max(0.022, Math.min(0.04, linkLength * 0.16));
                    const bodyGeo = new THREE.CylinderGeometry(bodyRadius, bodyRadius * 0.95, linkLength * 0.85, 16);
                    const bodyMat = new THREE.MeshStandardMaterial({
                        color: i % 2 === 0 ? 0x4a4a50 : 0x3a3a40,
                        metalness: 0.7,
                        roughness: 0.25,
                    });
                    const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
                    bodyMesh.castShadow = true;
                    bodyMesh.receiveShadow = true;

                    // Position at midpoint
                    bodyMesh.position.set(
                        (cumulativePos.x + nextPos.x) / 2,
                        (cumulativePos.y + nextPos.y) / 2,
                        (cumulativePos.z + nextPos.z) / 2
                    );

                    // Orient along link direction
                    if (linkLength > 0.001) {
                        const up = new THREE.Vector3(0, 1, 0);
                        const quat = new THREE.Quaternion().setFromUnitVectors(up, dir.normalize());
                        bodyMesh.quaternion.copy(quat);
                    }

                    robotGroup.add(bodyMesh);
                    linkCylinders.push(bodyMesh);
                } else {
                    // Placeholder for zero-length links
                    linkCylinders.push(null);
                }

                // Joint housing at the connection point
                const housingRadius = 0.035;
                const housingLength = 0.04;
                const housingGeo = new THREE.CylinderGeometry(housingRadius, housingRadius, housingLength, 20);

                // Joint color based on axis
                let jointColor;
                if (Math.abs(jdata.axis.z) > 0.5) jointColor = 0x4a7ab5; // Z-axis: blue
                else if (Math.abs(jdata.axis.y) > 0.5) jointColor = 0x5aab5a; // Y-axis: green
                else jointColor = 0xab5a4a; // X-axis: red

                const housingMat = new THREE.MeshStandardMaterial({
                    color: jointColor, metalness: 0.5, roughness: 0.35
                });
                const housingMesh = new THREE.Mesh(housingGeo, housingMat);
                housingMesh.position.copy(nextPos);
                housingMesh.castShadow = true;

                // Orient housing perpendicular to joint axis
                if (Math.abs(jdata.axis.x) > 0.5) {
                    housingMesh.rotation.z = Math.PI / 2;
                } else if (Math.abs(jdata.axis.y) > 0.5) {
                    housingMesh.rotation.x = Math.PI / 2;
                }
                // Z-axis: default cylinder orientation is fine

                robotGroup.add(housingMesh);
                jointSpheres.push(housingMesh);

                // Add a ring/flange at each joint for visual clarity
                const flangeGeo = new THREE.TorusGeometry(housingRadius + 0.005, 0.004, 8, 24);
                const flangeMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.1 });
                const flange = new THREE.Mesh(flangeGeo, flangeMat);
                flange.position.copy(nextPos);
                flange.rotation.x = Math.PI / 2;
                robotGroup.add(flange);

                cumulativePos = nextPos;
            }

            // End effector / tool flange
            const eeGeo = new THREE.CylinderGeometry(0.025, 0.03, 0.015, 20);
            const eeMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, metalness: 0.5, roughness: 0.3 });
            eeMesh = new THREE.Mesh(eeGeo, eeMat);
            eeMesh.position.copy(cumulativePos);
            eeMesh.position.y += 0.01;
            eeMesh.castShadow = true;
            robotGroup.add(eeMesh);

            scene.add(robotGroup);

            // Attempt to load actual mesh files if available
            if (meshBaseUrl && geometryData.mesh_files) {
                loadMeshes(geometryData.mesh_files, meshBaseUrl);
            }
        }

        function loadMeshes(meshFiles, meshBaseUrl) {
            /**
             * Attempt to load STL/DAE mesh files for accurate visual representation.
             * Falls back silently to generated shapes if meshes can't be loaded.
             */
            const stlLoader = new THREE.STLLoader();

            for (const [linkName, meshInfo] of Object.entries(meshFiles)) {
                let filename = meshInfo.filename;

                // Resolve package:// paths to raw GitHub URLs
                if (filename.startsWith('package://')) {
                    filename = filename.replace('package://', '');
                }
                // Remove leading ../ or ./
                filename = filename.replace(/^(\.\.\/|\.\/)+/, '');

                // Construct full URL
                const fullUrl = meshBaseUrl + filename;

                // Determine file type
                const ext = filename.split('.').pop().toLowerCase();

                if (ext === 'stl') {
                    stlLoader.load(fullUrl, (geometry) => {
                        const color = meshInfo.color || [0.5, 0.5, 0.5, 1.0];
                        const material = new THREE.MeshStandardMaterial({
                            color: new THREE.Color(color[0], color[1], color[2]),
                            metalness: 0.4,
                            roughness: 0.5,
                        });
                        const mesh = new THREE.Mesh(geometry, material);
                        mesh.castShadow = true;
                        mesh.receiveShadow = true;
                        // Store for FK updates
                        mesh.userData.linkName = linkName;
                        robotGroup.add(mesh);
                    }, undefined, (err) => {
                        // Silently fail — we have the generated shapes as fallback
                        console.log(`Mesh load skipped: ${linkName} (${ext})`);
                    });
                }
                // DAE/Collada loading
                else if (ext === 'dae' && THREE.ColladaLoader) {
                    const colladaLoader = new THREE.ColladaLoader();
                    colladaLoader.load(fullUrl, (collada) => {
                        const model = collada.scene;
                        model.userData.linkName = linkName;
                        robotGroup.add(model);
                    }, undefined, (err) => {
                        console.log(`Mesh load skipped: ${linkName} (${ext})`);
                    });
                }
            }
        }

        // ===================== DRONES =====================
        let droneId = null;
        let droneMesh = null;
        let rotorMeshes = [];

        async function addDrone(type) {
            if (!worldId) { await createWorld(); }
            const r = await fetch(`${API}/api/drones`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: type, drone_type: type })
            });
            const data = await r.json();
            droneId = data.drone_id;
            buildDroneVisual(data.num_rotors);
            document.getElementById('drone-section').style.display = 'block';
            document.getElementById('joints-section').style.display = 'none';
            document.getElementById('mobile-section').style.display = 'none';
            setStatus('idle', `${type} drone added (${data.num_rotors} rotors)`);
            // Auto-start sim
            controlSim('start');
        }

        function buildDroneVisual(numRotors) {
            if (droneMesh) robotGroup.remove(droneMesh);
            if (!robotGroup) { robotGroup = new THREE.Group(); scene.add(robotGroup); }

            droneMesh = new THREE.Group();
            rotorMeshes = [];

            // Body
            const bodyGeo = new THREE.BoxGeometry(0.08, 0.03, 0.08);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.6, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            droneMesh.add(body);

            // Arms and rotors
            const armLength = 0.18;
            for (let i = 0; i < numRotors; i++) {
                const angle = (i / numRotors) * Math.PI * 2;
                const x = Math.cos(angle) * armLength;
                const z = Math.sin(angle) * armLength;

                // Arm
                const armGeo = new THREE.CylinderGeometry(0.008, 0.008, armLength, 8);
                const armMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
                const arm = new THREE.Mesh(armGeo, armMat);
                arm.position.set(x / 2, 0, z / 2);
                arm.rotation.z = Math.PI / 2;
                arm.lookAt(x, 0, z);
                arm.rotateX(Math.PI / 2);
                droneMesh.add(arm);

                // Rotor disc
                const rotorGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.005, 16);
                const rotorMat = new THREE.MeshStandardMaterial({ 
                    color: i % 2 === 0 ? 0x58a6ff : 0x3fb950, 
                    transparent: true, opacity: 0.6 
                });
                const rotor = new THREE.Mesh(rotorGeo, rotorMat);
                rotor.position.set(x, 0.02, z);
                droneMesh.add(rotor);
                rotorMeshes.push(rotor);
            }

            // LED indicator
            const ledGeo = new THREE.SphereGeometry(0.01, 8, 8);
            const ledMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 0.8 });
            const led = new THREE.Mesh(ledGeo, ledMat);
            led.position.set(0.04, 0.02, 0);
            droneMesh.add(led);

            droneMesh.position.set(0, 0.02, 0);
            robotGroup.add(droneMesh);
        }

        async function onDroneSlider() {
            if (!droneId) return;
            const thrust = parseFloat(document.getElementById('slider-thrust').value);
            const roll = parseFloat(document.getElementById('slider-roll').value);
            const pitch = parseFloat(document.getElementById('slider-pitch').value);
            const yaw = parseFloat(document.getElementById('slider-yaw').value);

            document.getElementById('val-thrust').textContent = thrust.toFixed(2);
            document.getElementById('val-roll').textContent = roll.toFixed(2);
            document.getElementById('val-pitch').textContent = pitch.toFixed(2);
            document.getElementById('val-yaw').textContent = yaw.toFixed(2);

            await fetch(`${API}/api/drones/command`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ drone_id: droneId, thrust, roll, pitch, yaw_rate: yaw })
            });
        }

        // ===================== MOBILE ROBOTS =====================
        let mobileRobotId = null;
        let mobileRobotMesh = null;

        async function addMobileRobot(type) {
            if (!worldId) { await createWorld(); }
            const r = await fetch(`${API}/api/mobile-robots`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: type + '_bot', drive_type: type })
            });
            const data = await r.json();
            mobileRobotId = data.robot_id;
            buildMobileRobotVisual(type);
            document.getElementById('mobile-section').style.display = 'block';
            document.getElementById('joints-section').style.display = 'none';
            document.getElementById('drone-section').style.display = 'none';
            setStatus('idle', `${type} mobile robot added`);
            controlSim('start');
        }

        function buildMobileRobotVisual(type) {
            if (mobileRobotMesh) robotGroup.remove(mobileRobotMesh);
            if (!robotGroup) { robotGroup = new THREE.Group(); scene.add(robotGroup); }

            mobileRobotMesh = new THREE.Group();

            // Body
            const bodyGeo = new THREE.BoxGeometry(0.3, 0.1, 0.2);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2d4059, metalness: 0.3, roughness: 0.5 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.06;
            body.castShadow = true;
            mobileRobotMesh.add(body);

            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.02, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });

            const wheelPositions = [
                [0.1, 0.04, 0.11], [0.1, 0.04, -0.11],
                [-0.1, 0.04, 0.11], [-0.1, 0.04, -0.11],
            ];
            for (const [wx, wy, wz] of wheelPositions) {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.position.set(wx, wy, wz);
                wheel.rotation.x = Math.PI / 2;
                mobileRobotMesh.add(wheel);
            }

            // Direction indicator
            const arrowGeo = new THREE.ConeGeometry(0.02, 0.05, 8);
            const arrowMat = new THREE.MeshStandardMaterial({ color: 0xf85149 });
            const arrow = new THREE.Mesh(arrowGeo, arrowMat);
            arrow.position.set(0.17, 0.1, 0);
            arrow.rotation.z = -Math.PI / 2;
            mobileRobotMesh.add(arrow);

            robotGroup.add(mobileRobotMesh);
        }

        async function onMobileSlider() {
            if (!mobileRobotId) return;
            const linear = parseFloat(document.getElementById('slider-linear').value);
            const angular = parseFloat(document.getElementById('slider-angular').value);

            document.getElementById('val-linear').textContent = linear.toFixed(2);
            document.getElementById('val-angular').textContent = angular.toFixed(2);

            await fetch(`${API}/api/mobile-robots/command`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ robot_id: mobileRobotId, linear_x: linear, angular_z: angular })
            });
        }

        // ===================== UPDATE FROM WEBSOCKET =====================
        function updateDroneFromState(droneState) {
            if (!droneMesh || !droneState) return;
            for (const [did, state] of Object.entries(droneState)) {
                if (state.position) {
                    const [x, y, z] = state.position;
                    droneMesh.position.set(x, z, -y);
                }
                if (state.orientation) {
                    const [qx, qy, qz, qw] = state.orientation;
                    droneMesh.quaternion.set(qx, qz, -qy, qw);
                }
                // Spin rotors
                for (const rotor of rotorMeshes) {
                    rotor.rotation.y += 0.5;
                }
            }
        }

        function updateMobileRobotFromState(mobileState) {
            if (!mobileRobotMesh || !mobileState) return;
            for (const [rid, state] of Object.entries(mobileState)) {
                if (state.position) {
                    const [x, y, z] = state.position;
                    mobileRobotMesh.position.set(x, z || 0, -y);
                }
                if (state.heading !== undefined) {
                    mobileRobotMesh.rotation.y = -state.heading;
                }
            }
        }

        // ===================== INIT =====================
        initScene();
    </script>
